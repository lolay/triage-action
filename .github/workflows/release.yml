# Release pipeline for lolay/triage-action.
#
# Trigger: push a semver tag vX.Y.Z.
#
# Remote pushes happen LAST: bump the root VERSION file (CLI pin), commit,
# then promote floating tags vX.Y / vX — mirroring lolay/triage release ordering.
#
# See lolay/triage specs/action.md and specs/releasing.md.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GIT_AUTHOR_NAME: triage-action-release-bot
  GIT_AUTHOR_EMAIL: triage-action-release-bot@lolay.com
  GIT_COMMITTER_NAME: triage-action-release-bot
  GIT_COMMITTER_EMAIL: triage-action-release-bot@lolay.com

jobs:
  bump-version:
    name: bump VERSION
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Write VERSION to match tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "$VERSION" > VERSION
          git add VERSION
          if git diff --cached --quiet; then
            echo "VERSION already matches tag"
          else
            git commit -m "chore: bump VERSION to ${VERSION} for ${TAG}"
            git push origin HEAD:main
          fi

  promote-floating-tags:
    name: promote floating tags
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      !contains(github.ref, '-')
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Force-push floating major/minor tags
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"

          git config user.name "triage-action-release-bot"
          git config user.email "triage-action-release-bot@lolay.com"

          git tag --force "v${MINOR}"
          git push --force origin "v${MINOR}"

          git tag --force "v${MAJOR}"
          git push --force origin "v${MAJOR}"

# CI gate: actionlint + shellcheck + dogfood smoke (uses: ./).
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: actionlint · shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install actionlint
        run: |
          curl -sSfL "https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash" \
            | bash -s -- 1.7.7
          sudo mv actionlint /usr/local/bin/

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: make ci
        run: make ci

  dogfood:
    name: dogfood smoke
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Run local action
        id: triage
        uses: ./
        with:
          profile: ci

      - name: Report outputs
        run: |
          echo "installed CLI version: ${{ steps.triage.outputs.version }}"
          echo "exit code: ${{ steps.triage.outputs.exit-code }}"
